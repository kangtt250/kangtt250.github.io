url:                   https://zhuhongqiao.com
baseurl:               ''

lang:                  en

title:                 Seon Zhu

description:           >
  Official personal website of Seon Zhu, a FinTech and digital assets business development professional with experience at Binance, Bybit, Gate.io, and Rock Bund Capital.

tagline:               >
  Christian · Pisces · INFJ-A 

keywords:
  - Seon
  - Seon Zhu
  - Seon Zhu personal website
  - FinTech
  - digital assets
  - crypto derivatives
  - Binance
  - Bybit

logo:                  /assets/img/site_images/icon.png

author:
  name:                Seon Zhu
  email:               seon.zhu@gmail.com
  twitter:             Seon_Zhu

twitter:
  username:            Seon_Zhu

social:
  name:                Seon Zhu
  links:
    - https://twitter.com/Seon_Zhu
    - https://www.linkedin.com/in/seon
    - https://instagram.com/seonzhu.eth
    - https://play.spotify.com/artist/3rSQoTfa4Po9kK51DKVAGQ
    - https://soundcloud.com/seon-zhu

menu:  
  - title:             About
    url:               /about/
  - title:             Blogs
    url:               /blogs/
  - title:             Profile
    url:               /profile/

copyright_name:        Seon Zhu

permalink:             /:categories/:year-:month-:day-:title/

paginate:              5
paginate_path:         /page-:num/

accent_image:          /assets/img/sidebar-bg.jpg
accent_color:          rgb(174,136,79)

theme_color:           rgb(25,55,71)

google_fonts:          Roboto+Slab:400|Noto+Sans:400,400i,700,700i

font:                  Noto Sans, Helvetica, Arial, sans-serif

font_heading:          Roboto Slab, Helvetica, Arial, sans-serif

hydejack:
  post_addons:         [about, related]
  no_google_fonts:     false
  no_mark_external:    true
  no_push_state:       false
  no_drawer:           false
  no_img:              true
  no_inline_css:       false
  no_page_style:       false
  no_break_layout:     false
  no_theme_color:      false
  use_lsi:             false
  cookies_banner:      false
  advertise:           false
  dark_mode:
    always:            false
    dynamic:           true
    sunrise:           6
    sunset:            18
    icon:              true
  offline:
    enabled:           false
    cache_version:     1

exclude:
  - vendor
  - Gemfile
  - Gemfile.lock  

plugins:
  - jekyll-default-layout
  - jekyll-feed
  - jekyll-optional-front-matter
  - jekyll-paginate
  - jekyll-readme-index
  - jekyll-redirect-from
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-titles-from-headings

optional_front_matter:
  remove_originals:    true

readme_index:
  remove_originals:    true
  with_frontmatter:    true

relative_links:
  collections:         true

titles_from_headings:
  strip_title:         true
  collections:         true

kramdown:
  footnote_backlink:   '&#x21a9;&#xfe0e;'
  math_engine:         mathjax
  math_engine_opts:
    preview:           true
    preview_as_code:   true

compress_html:
  comments:            ["<!-- ", " -->"]
  clippings:           all
  endings:             all  

sass:
  style:               compressed
